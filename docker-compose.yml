services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/app
    restart: unless-stopped
    networks:
      - scrollkeeper

networks:
  scrollkeeper:
    name: scrollkeeper-net
